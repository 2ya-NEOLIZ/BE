spring:
  application:
    name: neoliz
  config:
    import: optional:application-secret.yaml
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

jwt:
  access-token-expiration: 1800000
  refresh-token-expiration: 1209600000
