services:
  mysql:
    image: mysql:8.4
    container_name: neoliz-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: neoliz
      MYSQL_USER: neoliz
      MYSQL_PASSWORD: neoliz1234
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data:
